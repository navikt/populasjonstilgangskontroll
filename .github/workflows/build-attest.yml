name: Build and attest (reusable)

# Gjenbrukbar workflow som kompilerer, tester, bygger image med Jib,
# genererer SBOM og signerer/attesterer image mot Navs registry.

on:
  workflow_call:
    inputs:
      base-image:
        description: "Jib base image (FROM)"
        required: false
        type: string
        default: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25
      publish-pages:
        description: "Publiser JaCoCo + testrapport til GitHub Pages"
        required: false
        type: boolean
        default: false
      checkout-ref:
        description: "Ref å sjekke ut (tom = default GITHUB_REF)"
        required: false
        type: string
        default: ""
      checkout-repository:
        description: "Repo å sjekke ut (tom = current repo)"
        required: false
        type: string
        default: ""
      checkout-fetch-depth:
        description: "fetch-depth for checkout"
        required: false
        type: number
        default: 1
      cache-read-only:
        description: "Gradle cache read-only"
        required: false
        type: boolean
        default: true
      environment:
        description: "GitHub Actions environment for build-jobben (tom = ingen)"
        required: false
        type: string
        default: ""
    outputs:
      image:
        description: "Fullt image-ref med tag"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    permissions:
      pages: write     # actions/deploy-pages når publish-pages=true
      checks: write    # publisere test-resultater til Checks API
      contents: write  # gradle/actions/dependency-submission skriver dependency graph
      id-token: write  # nais/login + nais/attest-sign (OIDC mot GAR + Sigstore)
    env:
      IMAGE: europe-north1-docker.pkg.dev/nais-management-233d/tilgangsmaskin/${{ github.event.repository.name }}
      BASE: ${{ inputs.base-image }}
    outputs:
      image: ${{ steps.kompiler.outputs.image }}
      digest: ${{ steps.kompiler.outputs.digest }}
    steps:
      - name: Sjekker ut kode
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
          repository: ${{ inputs.checkout-repository || github.repository }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          persist-credentials: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ inputs.cache-read-only }}

      - name: Install Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: temurin

      - name: Installer cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Setter tag-navn
        run: echo "TAG=$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login GAR
        uses: nais/login@d6ab5d83f735e9f155eb9d7d29cd20ae46820ea9 # v0
        with:
          team: tilgangsmaskin

      - name: Configure Gradle for GPR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${GH_ACTOR}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${GH_TOKEN}" >> ~/.gradle/gradle.properties

      - name: Test og bygg
        id: kompiler
        run: |
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          ./gradlew --warning-mode all test jacocoTestReport cyclonedxBom jib \
            -Djib.to.tags=latest,"${TAG}" \
            -Djib.from.image="${BASE}" \
            -Djib.to.image="${IMAGE}:${TAG}"
          DIGEST=$(cat build/jib-image.digest)
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
        env:
          ORG_GRADLE_PROJECT_githubUser: x-access-token
          ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Pages artifact
        if: ${{ inputs.publish-pages }}
        run: |
          echo "--- JaCoCo report ---"
          ls build/reports/jacoco/test/html/ || echo "Missing JaCoCo report"
          echo "--- Test report ---"
          ls build/reports/tests/test/ || echo "Missing test report"
          mkdir -p build/reports/pages/jacoco
          mkdir -p build/reports/pages/tests
          cp -r build/reports/jacoco/test/html/. build/reports/pages/jacoco/
          cp -r build/reports/tests/test/. build/reports/pages/tests/
          pip install mkdocs-material
          mkdocs build -f docs/mkdocs.yml
          cat > build/reports/pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <body>
            <h1>Test & Coverage</h1>
            <ul>
              <li><a href="jacoco/index.html">JaCoCo Coverage</a></li>
              <li><a href="tests/index.html">Test Report</a></li>
              <li><a href="adr/">Architecture Decision Records</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        if: ${{ inputs.publish-pages }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        if: ${{ inputs.publish-pages }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/reports/pages

      - name: Deploy to GitHub Pages
        if: ${{ inputs.publish-pages }}
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Attest and sign
        uses: nais/attest-sign@c839bd87ba71207e36341b6e9b6d8aabdcbc86c2 # v2.0.12
        with:
          image_ref: ${{ env.IMAGE }}@${{ env.DIGEST }}
          sbom: build/reports/cyclonedx/application.cdx.json
