# This workflow requires "advanced setup" to be enabled for CodeQL in the repository settings.
# To enable: Settings → Code security → CodeQL analysis → Switch to advanced
# This replaces the default autobuild which fails with SSL certificate errors when using Java 25.
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'

# Én CodeQL-kjøring om gangen per ref — kanseller pågående når ny push kommer.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write  # codeql-action/analyze laster opp SARIF
      packages: read          # hente private GitHub Packages under build
      actions: read           # CodeQL leser workflow-metadata
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Setup Java 25
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        languages: java-kotlin
        build-mode: manual

    - name: Build with Gradle
      env:
        ORG_GRADLE_PROJECT_githubUser: x-access-token
        ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./gradlew --version
        ./gradlew clean build -x test --no-daemon 

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        category: "/language:java-kotlin"
