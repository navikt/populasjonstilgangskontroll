# This workflow requires "advanced setup" to be enabled for CodeQL in the repository settings.
# To enable: Settings → Code security → CodeQL analysis → Switch to advanced
# This replaces the default autobuild which fails with SSL certificate errors when using Java 25.
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'

# Én CodeQL-kjøring om gangen per ref — kanseller pågående når ny push kommer.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write  # codeql-action/analyze laster opp SARIF
      packages: read          # hente private GitHub Packages under build
      actions: read           # CodeQL leser workflow-metadata
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Setup Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        languages: java-kotlin
        build-mode: manual

    - name: Build with Gradle
      env:
        ORG_GRADLE_PROJECT_githubUser: x-access-token
        ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./gradlew --version
        ./gradlew clean build -x test --no-daemon 

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        category: "/language:java-kotlin"
