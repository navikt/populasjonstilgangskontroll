name: Copilot Customization Sync
on:
  schedule:
    - cron: '0 7 * * 1'  # Mandager kl. 07:00 UTC
  workflow_dispatch:

# Deny-by-default på workflow-nivå; jobben åpner kun det den trenger.
permissions:
  contents: read

jobs:
  sync:
    uses: navikt/copilot/.github/workflows/copilot-customization-sync.yml@6d4adbb21ff83b37908c3b2d4018b497e31e919d # v0.5.0
    permissions:
      contents: write       # committe oppdaterte Copilot-customization-filer
      pull-requests: write  # opprette PR med endringene
