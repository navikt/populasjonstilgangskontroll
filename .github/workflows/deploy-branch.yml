name: Build and deploy branch
on:
  pull_request:
    branches:
      - main

# Én PR-build om gangen per PR — kanseller pågående når ny push kommer.
concurrency:
  group: deploy-branch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  build:
    name: build
    permissions:
      pages: write     # actions/deploy-pages
      checks: write    # publisere test-resultater til Checks API
      contents: read   # checkout kode
      id-token: write  # nais/docker-build-push + nais/attest-sign (OIDC mot GAR + Sigstore)
    uses: ./.github/workflows/build.yml
    with:
      publish-pages: true
      cache-read-only: false
      checkout-ref: ${{ github.event.pull_request.head.ref }}
      checkout-repository: ${{ github.event.pull_request.head.repo.full_name }}
      checkout-fetch-depth: 0
      environment: github-pages

  deploy:
    permissions:
      contents: read
      id-token: write  # nais/deploy/actions/deploy (OIDC mot Nais)
    strategy:
      matrix:
        cluster: [ dev-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      ${{matrix.cluster}}:tilgangsmaskin
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/valkey.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
