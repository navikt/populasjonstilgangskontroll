name: Build and deploy branch
on:
  pull_request:
    branches:
      - main

# Én PR-build om gangen per PR — kanseller pågående når ny push kommer.
concurrency:
  group: deploy-branch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    permissions:
      pages: write
      checks: write
      contents: write
      id-token: write
    uses: ./.github/workflows/build-attest.yml
    with:
      base-image: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25-dev
      publish-pages: false
      cache-read-only: false
      checkout-ref: ${{ github.event.pull_request.head.ref }}
      checkout-repository: ${{ github.event.pull_request.head.repo.full_name }}
      checkout-fetch-depth: 0
      environment: github-pages
    secrets: inherit

  deploy:
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        cluster: [ dev-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      ${{matrix.cluster}}:tilgangsmaskin
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/valkey.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
