name: Build and deploy branch
on:
  pull_request:
    branches:
      - main

# Én PR-build om gangen per PR — kanseller pågående når ny push kommer.
concurrency:
  group: deploy-branch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  build:
    name: build
    permissions:
      pages: write     # actions/deploy-pages
      checks: write    # publisere test-resultater til Checks API
      contents: write  # gradle/actions/dependency-submission skriver dependency graph
      id-token: write  # nais/login + nais/attest-sign (OIDC mot GAR + Sigstore)
    uses: ./.github/workflows/build-attest.yml
    with:
      base-image: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25-dev
      publish-pages: false
      cache-read-only: false
      checkout-ref: ${{ github.event.pull_request.head.ref }}
      checkout-repository: ${{ github.event.pull_request.head.repo.full_name }}
      checkout-fetch-depth: 0
      environment: github-pages

  deploy:
    permissions:
      contents: read
      id-token: write  # nais/deploy/actions/deploy (OIDC mot Nais)
    strategy:
      matrix:
        cluster: [ dev-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      ${{matrix.cluster}}:tilgangsmaskin
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/valkey.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: nais/deploy/actions/deploy@d57354b433c8d6847ab092467d9fe976a3d008aa # v2
