name: Build and deploy
on:
  push:
    branches:
      - main

# Hindre parallelle deploys av samme branch — køes opp i stedet.
# cancel-in-progress: false fordi en pågående deploy ikke skal avbrytes midt i.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  build:
    name: build
    permissions:
      pages: write
      checks: write
      contents: write
      id-token: write
    uses: ./.github/workflows/build-attest.yml
    with:
      base-image: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25
      publish-pages: true
      cache-read-only: true

  deploy:
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        cluster: [ dev-gcp, prod-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{matrix.cluster}}:tilgangsmaskin
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/probes.yaml,.nais/probe-alerts.yaml,.nais/valkey.yaml,.nais/serviceintegration.yaml,.nais/alerts.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
