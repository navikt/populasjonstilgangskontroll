name: Build and deploy
on:
  push:
    branches:
      - main

# Hindre parallelle deploys av samme branch — køes opp i stedet.
# cancel-in-progress: false fordi en pågående deploy ikke skal avbrytes midt i.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Deny-by-default på workflow-nivå; jobs åpner kun det de trenger.
permissions:
  contents: read

jobs:
  build:
    name: build
    permissions:
      pages: write     # actions/deploy-pages publiserer JaCoCo + testrapport
      checks: write    # publisere test-resultater til Checks API
      contents: read   # checkout kode
      id-token: write  # nais/docker-build-push + nais/attest-sign (OIDC mot GAR + Sigstore)
    uses: ./.github/workflows/build.yml
    with:
      publish-pages: true
      cache-read-only: true

  deploy:
    permissions:
      contents: read
      id-token: write  # nais/deploy/actions/deploy (OIDC mot Nais)
    strategy:
      matrix:
        cluster: [ dev-gcp, prod-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{matrix.cluster}}:tilgangsmaskin
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/probes.yaml,.nais/probe-alerts.yaml,.nais/valkey.yaml,.nais/serviceintegration.yaml,.nais/alerts.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
