
server:
  shutdown: graceful
  jetty:
    threads:
      max: 200
management:
  info:
    os:
      enabled: true
    git:
      enabled: true
    java:
      enabled: true
    env:
      enabled: true
  auditevents:
    enabled: false
  metrics:
    distribution:
      percentiles-histogram:
        '[komplette_regler]': true
        '[pdl_tjeneste]': true
        '[entra]': true
        '[valkey.cache.varighet]': true
    enable:
      cache: true
  observations:
    annotations:
      enabled: true
  health:
    group:
      readiness:
        show-components: never
      liveness:
        show-components: never
    redis:
      enabled: false
    ssl:
      enabled: false
    ping:
      enabled: false
    diskspace:
      enabled: false
  endpoints:
    web:
      base-path: /monitoring

kafka:
  slack:
    webhook-url: ${KAFKA_SLACK_WEBHOOK_URL:}

spring:
  threads:
    virtual:
      enabled: true
  jpa:
    properties:
      hibernate:
        generate_statistics: false
  application:
    name: populasjonstilgangskontroll
  kafka:
    bootstrap-servers: ${kafka.brokers}
    properties:
      ssl:
        endpoint:
          identification:
            algorithm: ''
    security:
      protocol: SSL
    ssl:
      trust-store-location: file:${kafka.truststore.path}
      trust-store-type: JKS
      trust-store-password: ${kafka.credstore.password}
      key-store-location: file:${kafka.keystore.path}
      key-store-type: PKCS12
      key-store-password: ${kafka.credstore.password}

    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        "[auto.offset.reset]": earliest
        "[spring.json.use.type.headers]": false
        "[spring.json.trusted.packages]": no.nav.tilgangsmaskin
        "[spring.deserializer.key.delegate.class]": org.apache.kafka.common.serialization.StringDeserializer
        "[spring.deserializer.value.delegate.class]": org.springframework.kafka.support.serializer.JacksonJsonDeserializer

  data:
    redis:
      repositories:
            enabled: false
      lettuce:
        pool:
          enabled: true
          max-active: 24
          max-idle: 24

      host: ${valkey.host.${nais.cluster.cache}}
      port: ${valkey.port.${nais.cluster.cache}}
      connect-timeout: 10s
      timeout: 5s
      username: ${valkey.username.${nais.cluster.cache}}
      password: ${valkey.password.${nais.cluster.cache}}
      ssl:
        enabled: true
  cache:
    type: redis
    redis:
      enable-statistics: true
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${db.jdbc.url}
    username: ${db.username}
    password: ${db.password}
    hikari:
      connection-timeout: 5000
      max-lifetime: 1200000
      idle-timeout: 600000
      connection-test-query: SELECT 1
      maximum-pool-size: ${db.poolsize}
    connection-fetch: lazy
  main:
    banner-mode: off
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    default-property-inclusion: non_null

no.nav.security.jwt:
  issuer:
    azuread:
      discovery-url: ${azure.app.well.known.url}
      accepted_audience: ${azure.app.client.id}
  client:
    registration:
      repr-api:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope: "api://${nais.cluster.type}-gcp.repr.repr-api/.default"
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt

      pdl-api:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope: "api://${nais.cluster.type}-fss.pdl.pdl-api/.default"
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt

      pdl-pip-api:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope: "api://${nais.cluster.type}-fss.pdl.pdl-pip-api/.default"
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt

      skjermede-personer-pip:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope: "api://${nais.cluster.type}-gcp.nom.skjermede-personer-pip/.default"
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt

      graph:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope:  https://graph.microsoft.com/.default
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt

      entra-proxy:
        token-endpoint-url: ${azure.openid.config.token.endpoint}
        grant-type: client_credentials
        scope: "api://${nais.cluster.type}-gcp.sikkerhetstjenesten.entra-proxy/.default"
        authentication:
          client-id: ${azure.app.client.id}
          client-jwk: ${azure.app.jwk}
          client-auth-method: private_key_jwt
springdoc:
  swagger-ui:
    oauth:
      client-id: ${azure.app.client.id}
    csrf:
      enabled: true
info:
  cluster: ${nais.cluster.name:local}
  name: ${spring.application.name}
  image: ${nais.app.image:unknown}

