openapi.tilgang.overstyr.summary=Overstyr regler for en bruker
openapi.tilgang.overstyr.description=Setter overstyring for en bruker, slik at den kan saksbehandles selv om tilgang opprinnelig avslås. BrukerId må være gyldig og finnes i PDL. Kjerneregelsettet vil bli kjørt før overstyring, og hvis de feiler vil overstyring ikke bli gjort. Overstyring vil gjelde frem til og med utløpsdatoen.
openapi.tilgang.bulk.summary=Kjør bulkregler for en ansatt
openapi.tilgang.bulk.obo.description=Dette endepunktet er kun tilgjengelig for obo flow. Det evaluerer regler for en ansatt mot et sett av brukerId-er og regeltyper. Om ingen regeltype oppgis, evalueres det komplette regelsettet.
openapi.tilgang.bulk.obo.regeltype.description=Dette endepunktet er kun tilgjengelig for obo flow. Det evaluerer regler for en ansatt mot et sett av brukerId-er med gitt regeltype.
openapi.tilgang.bulk.ccf.description=Dette endepunktet er kun tilgjengelig for client credentials flow. Det evaluerer regler for en ansatt mot et sett av brukerId-er og regeltyper. Om ingen regeltype oppgis, evalueres det komplette regelsettet.
openapi.tilgang.bulk.ccf.regeltype.description=Dette endepunktet er kun tilgjengelig for client credentials flow. Det evaluerer regler for en ansatt mot et sett av brukerId-er med gitt regeltype.

