# ArchUnit-konfigurasjon.
# Baseline for FreezingArchRule lagres her, slik at fila committes sammen med koden.
freeze.store.default.path=src/test/resources/archunit_store

# Sett til true (en gang, via -D-flag) for aa opprette store og fryse eksisterende brudd:
#   ./gradlew test --tests "*LagdelingArchTest*" -Darchunit.freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreCreation=false

# Sett til true (via -D-flag) for aa oppdatere baseline naar et brudd er fikset:
#   ./gradlew test --tests "*LagdelingArchTest*" -Darchunit.freeze.refreeze=true
freeze.refreeze=false

